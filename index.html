<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptread Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space+Mono', monospace; overflow: hidden; height: 100vh; background: #fff; color: black; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: black; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22black%22%20stroke-width%3D%223%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M6%209l6%206%206-6%22%3E%3C%2Fpath%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 0.5rem center; padding-right: 1.5rem; width: 100%; border: 2px solid black; font-size: 11px; font-weight: 700; background-color: white; cursor: pointer; }
        .pay-screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; z-index: 1000; text-align: center; padding: 40px; border: 12px solid black; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import ReactDOM from 'react-dom/client';

        const INWORLD_VOICES = {
            female: [{ id: "Abby", name: "Abby" }, { id: "Amina", name: "Amina" }, { id: "Victoria", name: "Victoria" }],
            male: [{ id: "Alex", name: "Alex" }, { id: "James", name: "James" }, { id: "Victor", name: "Victor" }]
        };

        const Scriptread = () => {
            const [segments, setSegments] = useState([]);
            const [characters, setCharacters] = useState([]);
            const [voiceMap, setVoiceMap] = useState({ Narrator: "Abby" });
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentIdx, setCurrentIdx] = useState(-1);
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [totalSeconds, setTotalSeconds] = useState(0);
            const [showPaywall, setShowPaywall] = useState(false);

            const audioContext = useRef(null);
            const activeSource = useRef(null);
            const isPlayingRef = useRef(false);
            const TRIAL_LIMIT = 30;

            // PULLS KEY SECURELY FROM VITE (using your dashboard setting)
            const API_KEY = import.meta.env.VITE_INWORLD_KEY;

            useEffect(() => {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                audioContext.current = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            }, []);

            useEffect(() => {
                if (!isUnlocked && totalSeconds >= TRIAL_LIMIT) { stopAudio(); setShowPaywall(true); }
            }, [totalSeconds, isUnlocked]);

            const stopAudio = () => {
                isPlayingRef.current = false; setIsPlaying(false);
                if (activeSource.current) { try { activeSource.current.stop(); } catch(e) {} activeSource.current = null; }
            };

            const fetchAudio = async (text, voiceId) => {
                const response = await fetch("https://api.inworld.ai/tts/v1/voice", {
                    method: "POST",
                    headers: { "Authorization": `Basic ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ text, voiceId, modelId: "inworld-tts-1.5-max" })
                });
                const data = await response.json();
                return await audioContext.current.decodeAudioData(new Uint8Array(atob(data.audioContent).split("").map(c => c.charCodeAt(0))).buffer);
            };

            const parseScript = (lines) => {
                const finalBlocks = [];
                const foundChars = new Set();
                let currentActionText = "";
                const flushAction = () => { if (currentActionText.trim()) { finalBlocks.push({ type: 'narrator', text: currentActionText.trim() }); currentActionText = ""; } };

                lines.forEach(line => {
                    let text = line.text.trim();
                    if (!text || /^\d+$/.test(text) || /^PAGE\s+\d+$/i.test(text)) return;
                    
                    // RE-FIXED SLUG EXPANSION
                    text = text.replace(/\bINT\b\.?/gi, "Interior").replace(/\bEXT\b\.?/gi, "Exterior");
                    text = text.replace(/\([^)]*\)/g, "").trim();
                    if (!text) return;

                    const isSlug = text.startsWith("Interior") || text.startsWith("Exterior");
                    const isCenteredChar = line.x > 180 && text === text.toUpperCase() && text.length < 30 && !isSlug;

                    if (isSlug) { flushAction(); finalBlocks.push({ type: 'narrator', text }); }
                    else if (isCenteredChar) { flushAction(); foundChars.add(text); finalBlocks.push({ type: 'dialogue', character: text, text: "" }); }
                    else if (line.x > 120 && line.x < 350 && finalBlocks.length > 0 && finalBlocks[finalBlocks.length - 1].type === 'dialogue') {
                        finalBlocks[finalBlocks.length - 1].text += " " + text;
                    } else { currentActionText += " " + text; }
                });
                flushAction();
                setCharacters([...foundChars].sort());
                setSegments(finalBlocks.filter(b => b.text.trim().length > 0));
            };

            const playSegment = async (index) => {
                if (!isPlayingRef.current || index >= segments.length || (!isUnlocked && totalSeconds >= TRIAL_LIMIT)) return;
                setCurrentIdx(index);
                const seg = segments[index];
                try {
                    const buffer = await fetchAudio(seg.text, voiceMap[seg.character] || voiceMap.Narrator);
                    const source = audioContext.current.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioContext.current.destination);
                    source.onended = () => { setTotalSeconds(prev => prev + buffer.duration); if (isPlayingRef.current) playSegment(index + 1); };
                    activeSource.current = source; source.start();
                } catch (e) { if(isPlayingRef.current) playSegment(index + 1); }
            };

            return (
                <div className="flex flex-col h-screen relative">
                    {showPaywall && (
                        <div className="pay-screen">
                            <h2 className="text-3xl font-black uppercase mb-4 italic">Support the Production</h2>
                            <p className="text-sm mb-8 max-w-md uppercase italic text-gray-600 leading-tight">The trial is complete. To continue reading with professional AI narration, please donate $2.50 per script read.</p>
                            <a href="https://paypal.me/jamesbergeron1252/2.50" target="_blank" className="bg-black text-white px-10 py-5 font-black uppercase border-4 border-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:invert transition-all">Donate $2.50 via PayPal</a>
                            <button onClick={() => setShowPaywall(false)} className="mt-8 text-[10px] font-black underline uppercase">Close and Go Back</button>
                        </div>
                    )}
                    <header className="border-b-4 border-black p-4 flex justify-between items-center bg-white z-50">
                        <h1 className="text-2xl font-black uppercase italic">Scriptread</h1>
                        <label className="px-6 py-2 bg-black text-white font-black text-[10px] cursor-pointer border-2 border-black uppercase">Load PDF <input type="file" className="hidden" accept=".pdf" onChange={(e) => {
                            const file = e.target.files[0]; const reader = new FileReader();
                            reader.onload = async () => {
                                const pdf = await window.pdfjsLib.getDocument({ data: reader.result }).promise;
                                let lines = [];
                                for (let i = 1; i <= pdf.numPages; i++) {
                                    const page = await pdf.getPage(i); const content = await page.getTextContent();
                                    content.items.forEach(item => lines.push({ text: item.str, x: item.transform[4] }));
                                }
                                parseScript(lines);
                            }; reader.readAsArrayBuffer(file);
                        }} /></label>
                    </header>
                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-64 border-r-4 border-black bg-gray-50 overflow-y-auto pb-[1000px]">
                            <div className="p-2 bg-black text-white font-black text-[10px] uppercase text-center sticky top-0 italic">Cast</div>
                            <div className="p-4 space-y-6">
                                {characters.map(char => (
                                    <div key={char} className="p-2 border-2 border-black bg-white shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                                        <p className="text-[9px] font-black uppercase mb-1">{char}</p>
                                        <select value={voiceMap[char] || "Abby"} onChange={(e) => setVoiceMap({...voiceMap, [char]: e.target.value})}>
                                            {INWORLD_VOICES.female.concat(INWORLD_VOICES.male).map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                                        </select>
                                    </div>
                                ))}
                            </div>
                        </aside>
                        <main className="flex-1 overflow-y-auto bg-white p-8 pb-32">
                            {segments.map((seg, i) => (
                                <div key={i} className={`p-6 border-2 mb-4 transition-all ${currentIdx === i ? 'bg-black text-white' : 'border-black opacity-30'}`}>
                                    <p className="text-sm font-bold uppercase leading-tight">{seg.text}</p>
                                </div>
                            ))}
                        </main>
                    </div>
                    <footer className="shrink-0 border-t-4 border-black p-6 bg-white flex justify-center">
                        <button onClick={() => {
                            if (isPlaying) stopAudio();
                            else { isPlayingRef.current = true; setIsPlaying(true); playSegment(currentIdx === -1 ? 0 : currentIdx); }
                        }} className="bg-black text-white p-5 rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-1">
                            {isPlaying ? "STOP" : "PLAY"}
                        </button>
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Scriptread />);
    </script>
</body>
</html>
